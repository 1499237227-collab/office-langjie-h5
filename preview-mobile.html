<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手机预览 · 办公室浪姐 H5</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100vh;
      background: #2a2d35;
      font-family: system-ui, sans-serif;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }
    .hint {
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }
    .hint code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .phone {
      width: min(390px, calc(100vw - 32px));
      height: min(844px, calc(100vh - 120px));
      border-radius: 44px;
      border: 12px solid #1c1e24;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 24px 80px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
    }
    .phone iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="hint">
      在本目录运行 <code>npx serve .</code> 或 <code>npx http-server . -p 8080</code>，浏览器打开
      <code>/preview-mobile.html</code>。勿用 <code>file://</code> 直接打开 iframe 内页（部分环境受限）。
    </p>
    <div class="phone" aria-label="手机预览框">
      <iframe src="./index.html" title="办公室浪姐诊断 H5"></iframe>
    </div>
  </div>
</body>
</html>
